<!DOCTYPE html>
<html>
<head>
    <title>Modern Web Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 120px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            margin-bottom: 25px;
        }

        button {
            background-color: white;
            color: #0077cc;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0077cc;
            color: white;
            transform: scale(1.05);
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            width: 60%;
            margin: auto;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <h1>Welcome 🚀</h1>

            <p>
                This page now has gradients, hover effects, and a modern glass-style card.
            </p>

            <button>Explore More</button>

        </div>
    </div>

</body>
</html>
