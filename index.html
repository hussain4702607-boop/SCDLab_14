<!DOCTYPE html>
<html>
<head>
    <title>My Stylish Web Page</title>

    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            color: darkblue;
        }

        p {
            color: #444;
            font-size: 18px;
        }

        button {
            background-color: darkblue;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: navy;
        }
    </style>
</head>

<body>

    <h1>Hello World 🌍</h1>

    <p>This is a simple styled HTML page.</p>

    <button>Click Here</button>

</body>
</html>
